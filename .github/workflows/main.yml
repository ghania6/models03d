name: Ultimate Windows RDP (Ngrok Pro)

on:
  workflow_dispatch:
    inputs:
      ngrok_token:
        description: 'Enter your Ngrok Authtoken'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Configure Windows User & RDP for Legacy Clients
        shell: powershell
        run: |
          $Password = ConvertTo-SecureString "WindowsPassword123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "SecurityLayer" -Value 1

          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Restart-Service -Name "TermService" -Force
          
      - name: Optimize System Performance
        shell: powershell
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          $Services = @("WSearch", "wuauserv", "DoSvc", "SysMain", "DiagTrack")
          foreach ($Service in $Services) {
              Stop-Service -Name $Service -Force -ErrorAction SilentlyContinue
              Set-Service -Name $Service -StartupType Disabled -ErrorAction SilentlyContinue
          }

      - name: Launch Ngrok Tunnel & Connect
        shell: powershell
        run: |
          # Install Ngrok via Chocolatey
          choco install ngrok --no-progress -y
          
          # Configure Authtoken from GitHub Input
          ngrok config add-authtoken "${{ github.event.inputs.ngrok_token }}"
          
          # Start Tunnel
          Start-Process ngrok -ArgumentList "tcp 3389" -WindowStyle Hidden
          Start-Sleep -Seconds 7
          
          # Fetch public URL dynamically
          $NgrokApi = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels"
          $TunnelUrl = $NgrokApi.tunnels.public_url
          
          if ($TunnelUrl) {
              $CleanUrl = $TunnelUrl -replace "tcp://", ""
              Write-Output "========================================================"
              Write-Output "SUCCESS: Ngrok Tunnel is Active!"
              Write-Output "========================================================"
              Write-Output " Computer Address : $CleanUrl"
              Write-Output " Username         : runneradmin"
              Write-Output " Password         : WindowsPassword123!"
              Write-Output "========================================================"
          } else {
              Write-Output "ERROR: Failed to launch Ngrok tunnel. Check your token."
          }

          # Keep Active
          Start-Sleep -Seconds 21600
