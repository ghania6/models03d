- name: Launch Ngrok Tunnel & Connect
        shell: powershell
        run: |
          # Install Ngrok via Chocolatey
          choco install ngrok --no-progress -y
          
          # Configure Authtoken from GitHub Input
          ngrok config add-authtoken "${{ github.event.inputs.ngrok_token }}"
          
          # Start Tunnel and create a log file
          Start-Process ngrok -ArgumentList "tcp 3389 --log=stdout" -RedirectStandardOutput "ngrok.log" -WindowStyle Hidden
          
          Write-Output "Waiting for Ngrok API to start..."
          $TunnelUrl = $null
          
          # Smart Loop: Try to connect to the API 15 times (every 2 seconds)
          for ($i = 0; $i -lt 15; $i++) {
              Start-Sleep -Seconds 2
              try {
                  $NgrokApi = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels" -ErrorAction Stop
                  $TunnelUrl = $NgrokApi.tunnels[0].public_url
                  if ($TunnelUrl) { break }
              } catch {
                  # API not ready yet, keep waiting
              }
          }
          
          if ($TunnelUrl) {
              $CleanUrl = $TunnelUrl -replace "tcp://", ""
              Write-Output "========================================================"
              Write-Output "SUCCESS: Ngrok Tunnel is Active!"
              Write-Output "========================================================"
              Write-Output " Computer Address : $CleanUrl"
              Write-Output " Username         : runneradmin"
              Write-Output " Password         : WindowsPassword123!"
              Write-Output "========================================================"
          } else {
              Write-Output "ERROR: Failed to launch Ngrok tunnel. This usually means your Token is invalid or missing."
              Write-Output "--- Ngrok Log ---"
              Get-Content "ngrok.log" -ErrorAction SilentlyContinue
          }

          # Keep Active
          Start-Sleep -Seconds 21600
