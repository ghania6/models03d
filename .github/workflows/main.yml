name: Ultimate Windows RDP (Pinggy - Win 7 Fix)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Configure Windows User & Disable Firewall for Win 7
        shell: powershell
        run: |
          $Password = ConvertTo-SecureString "WindowsPassword123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password

          # Enable RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          
          # CRITICAL FOR WINDOWS 7: Disable Network Level Authentication (NLA)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "SecurityLayer" -Value 0

          # DISABLE WINDOWS FIREWALL COMPLETELY
          Set-NetFirewallProfile -Profile Domain,Public,Private -Enabled False
          
          Restart-Service -Name "TermService" -Force
          
      - name: Optimize System Performance
        shell: powershell
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c
          $Services = @("WSearch", "wuauserv", "DoSvc", "SysMain", "DiagTrack")
          foreach ($Service in $Services) {
              Stop-Service -Name $Service -Force -ErrorAction SilentlyContinue
              Set-Service -Name $Service -StartupType Disabled -ErrorAction SilentlyContinue
          }

      - name: Launch Pinggy Tunnel & Connect
        shell: powershell
        run: |
          Write-Output "Starting Pinggy TCP Tunnel (No Account Required)..."
          
          # Start Pinggy using SSH
          Start-Process -FilePath "ssh" -ArgumentList "-p 443 -R0:localhost:3389 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 tcp@a.pinggy.io" -RedirectStandardOutput "pinggy_out.log" -RedirectStandardError "pinggy_err.log" -WindowStyle Hidden
          
          Write-Output "Waiting for tunnel connection..."
          $PinggyUrl = $null
          
          for ($i = 0; $i -lt 15; $i++) {
              Start-Sleep -Seconds 2
              if (Test-Path "pinggy_out.log") {
                  $PinggyUrl = Select-String -Path "pinggy_out.log" -Pattern "tcp://[a-zA-Z0-9.-]+:[0-9]+" | ForEach-Object { $_.Matches.Value } | Select-Object -First 1
                  if ($PinggyUrl) { break }
              }
          }
          
          if ($PinggyUrl) {
              $CleanUrl = $PinggyUrl -replace "tcp://", ""
              Write-Output "========================================================"
              Write-Output " SUCCESS: Pinggy Tunnel is Active!"
              Write-Output "========================================================"
              Write-Output " Computer Address : $CleanUrl"
              Write-Output " Username         : runneradmin"
              Write-Output " Password         : WindowsPassword123!"
              Write-Output "--------------------------------------------------------"
              Write-Output " Note: Pinggy free tunnels expire in 60 minutes."
              Write-Output "========================================================"
          } else {
              Write-Output "ERROR: Failed to launch Pinggy tunnel."
              Get-Content "pinggy_err.log" -ErrorAction SilentlyContinue
          }

          # Keep Server Active
          Start-Sleep -Seconds 3600
