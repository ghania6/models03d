name: Ultimate Windows RDP (Win 7 Compatible)

on: [workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 🛠️ Configure Windows User & RDP for Legacy Clients
        shell: powershell
        run: |
          # 1. إعداد كلمة المرور للمستخدم
          $Password = ConvertTo-SecureString "WindowsPassword123!" -AsPlainText -Force
          Set-LocalUser -Name "runneradmin" -Password $Password

          # 2. تفعيل الاتصال عن بعد
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
          
          # 3. تعطيل NLA بالكامل (خطوة إجبارية لـ Windows 7)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 0
          
          # 4. إجبار السيرفر على التوافق مع التشفير القديم (Negotiate)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "SecurityLayer" -Value 1

          # 5. السماح للـ RDP في جدار الحماية
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # 6. إعادة تشغيل خدمة الـ RDP لتطبيق التعديلات فورا (هذه الخطوة كانت تنقصك)
          Restart-Service -Name "TermService" -Force
          
      - name: 🚀 Optimize System Performance
        shell: powershell
        run: |
          # إيقاف Windows Defender لتسريع المعالج والقرص الصلب
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Set-MpPreference -DisableBehaviorMonitoring $true -ErrorAction SilentlyContinue

          # تفعيل وضع الأداء العالي
          powercfg /setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c

          # إيقاف الخدمات الثقيلة التي تستهلك الرام والانترنت
          $Services = @("WSearch", "wuauserv", "DoSvc", "SysMain", "DiagTrack")
          foreach ($Service in $Services) {
              Stop-Service -Name $Service -Force -ErrorAction SilentlyContinue
              Set-Service -Name $Service -StartupType Disabled -ErrorAction SilentlyContinue
          }

      - name: 🌐 Launch Bore Tunnel & Connect
        shell: powershell
        run: |
          # تحميل أداة Bore
          Invoke-WebRequest -Uri "https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-pc-windows-msvc.zip" -OutFile "bore.zip"
          Expand-Archive -Path "bore.zip" -DestinationPath "."

          # تشغيل النفق في الخلفية مع تسجيل الأخطاء بدقة
          Start-Process -FilePath ".\bore.exe" -ArgumentList "local 3389 --to bore.pub" -RedirectStandardOutput "bore.log" -RedirectStandardError "bore_err.log" -WindowStyle Hidden

          # استخراج رابط الاتصال بشكل ديناميكي واحترافي
          Write-Host "Waiting for tunnel to establish..." -ForegroundColor Yellow
          $tcp_address = $null
          for ($i = 0; $i -lt 15; $i++) {
              Start-Sleep -Seconds 2
              if (Test-Path "bore.log") {
                  $log = Get-Content -Path "bore.log" -ErrorAction SilentlyContinue
                  $tcp_address = $log | Select-String -Pattern "bore\.pub:[0-9]+" | ForEach-Object { $_.Matches.Value } | Select-Object -First 1
                  if ($tcp_address) { break }
              }
          }

          # طباعة النتيجة النهائية بشكل ملون وواضح في الكونسول
          if ($tcp_address) {
              Write-Host "========================================================" -ForegroundColor Green
              Write-Host " SUCCESS: RDP is Ready! (Optimized for Windows 7)" -ForegroundColor Green
              Write-Host "========================================================" -ForegroundColor Green
              Write-Host " 🖥️ Computer Address : $tcp_address" -ForegroundColor Cyan
              Write-Host " 👤 Username         : runneradmin" -ForegroundColor Cyan
              Write-Host " 🔑 Password         : WindowsPassword123!" -ForegroundColor Cyan
              Write-Host "========================================================" -ForegroundColor Green
          } else {
              Write-Host " ERROR: Could not get bore address. Please try again." -ForegroundColor Red
              Write-Host "--- Error Log ---" -ForegroundColor Red
              Get-Content "bore_err.log" -ErrorAction SilentlyContinue
          }

          # إبقاء السيرفر نشطاً لمدة 6 ساعات
          Write-Host "Keeping Windows Server active for 6 hours..." -ForegroundColor Yellow
          Start-Sleep -Seconds 21600
